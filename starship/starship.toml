"$schema" = 'https://starship.rs/config-schema.json'

format = """
$line_break
 $directory \
$git_branch\
$git_state\
$git_status\
$line_break\
${custom.env_status}\
$localip\
$character
"""

right_format = """
$python\
$nodejs\
$rust\
$cmake\
$dotnet\
"""

palette = "minimal"

[palettes.minimal]
default = "#b3b3b3"
dark_gray = "#7d7d7d"
black = "#090c0c"
baby_blue_0 = "#769ff0"
baby_blue_1 = "#394260"
baby_blue_2 = "#212736"
baby_blue_3 = "#1d2230"
white = "#e3e5e5"
hazy_baby_blue = "#a0a9cb"
python_blue = "#4280B2"
python_yellow = "#FFD94A"
nodejs_green = "#65B84A"
rust_orange = "#ff976a"
cmake_red = "#f32834"
cmake_blue = "#0068c7"
cmake_green = "#3dae2b"
cmake_black = "#484848"
dotnet_purple = "#7779b9"

[fill]
symbol = " "

[custom.env_status]
command = "source $DOTFILES_DIR/starship/env_values.sh"
when = true
symbol = ""
style = "green bold"

[localip]
ssh_only = true

[character]
success_symbol = "[❯](bold default)"
error_symbol = "[❯](bold red)"

[directory]
style = "fg:white bold"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "fg:#909295"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#909295"
format = '[($all_status$ahead_behind )]($style)'

[python]
symbol = "󱔎"
style = "fg:python_yellow bg:python_blue"
format = "[](fg:python_blue)[$symbol]($style)[ ($version)](fg:white bg:python_blue)[](fg:python_blue)[ ](fg:white)"

[nodejs]
symbol = ""
style = "fg:black bg:nodejs_green"
format = '[](fg:nodejs_green)[$symbol ($version)]($style)[](fg:nodejs_green)[ ](fg:white)'

[rust]
symbol = ""
style = "fg:black bg:rust_orange"
format = '[](fg:rust_orange)[$symbol ($version)]($style)[](fg:rust_orange)[ ](fg:white)'

[cmake]
symbol = ""
style = "fg:white bg:cmake_black"
format = '[](fg:cmake_green)[$symbol](bg:cmake_blue fg:cmake_red)[ ($version)]($style)[](fg:cmake_black)[ ](fg:white)'

[dotnet]
symbol = ".ɴᴇᴛ"
style = "fg:dotnet_purple bg:white"
format = '[](fg:white)[$symbol ($version)]($style)[](fg:white)'
